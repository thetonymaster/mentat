# golangci-lint v2 configuration.
# Pinned to the version CodeRabbit runs (v2.12.2). See `make lint`.
version: "2"

linters:
  # Keep the v2 default set (errcheck, govet, ineffassign, staticcheck, unused)
  # and add the two linters CodeRabbit flagged.
  default: standard
  enable:
    - errorlint    # CR finding #9: error wrapping / type-switch correctness.
    - predeclared  # CR finding #12: identifiers shadowing Go builtins.

formatters:
  # Make formatting part of the gate.
  enable:
    - gofmt
