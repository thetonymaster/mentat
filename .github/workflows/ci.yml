name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel a superseded in-progress run when new commits land on the same PR
# (github.ref is the per-PR merge ref for pull_request events, so the group is
# per-PR). Pushes to main are never cancelled — the event_name guard keeps every
# push to main fully validated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # setup-go's built-in cache keys only on go.sum, so once populated it
          # never re-saves (every run is a cache hit) and the build cache goes
          # stale — the source-keyed actions/cache below refreshes each run.
          cache: false
      - name: cache go build (check)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-gobuild-check-${{ hashFiles('**/go.sum', '**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-gobuild-check-
      - run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      # No standalone `go vet ./...`: golangci-lint's `default: standard` set runs
      # the govet analyzer, so a separate vet step just recompiles every package
      # again (~42s). Prebuilt binary + cached lint analysis cache, instead of
      # compiling golangci-lint from source (~70s of CPU) on every run.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
      # One test run covers race detection AND the coverage gate (COVERAGE_RACE=1),
      # replacing a separate `go test ./... -race` pass — the suite built+ran twice.
      - name: test + coverage gate (80%, race)
        run: COVERAGE_RACE=1 bash .claude/skills/coverage/coverage.sh ./...
      # The example extension is a SEPARATE module, so `go test ./...` and the
      # coverage gate above never reach it. `make example` builds + runs it and
      # import-lints it (spec 007 SC-001: zero module-private imports).
      - name: example extension (build + run + import-lint, SC-001)
        run: make example

  mocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install go.uber.org/mock/mockgen@v0.6.0
      - run: go generate ./...
      - name: fail on uncommitted mock drift
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all -- internal/core/mocks)" ]; then
            git status --short -- internal/core/mocks
            echo "regenerate mocks: go generate ./..."
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # source-keyed cache below; see the check job for why.
      - name: cache go build (e2e)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-gobuild-e2e-${{ hashFiles('**/go.sum', '**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-gobuild-e2e-
      - name: build lab SUTs
        # US9: mentat.yaml drives shell SUTs via prebuilt binaries (./bin/researchbot,
        # ./bin/orderflow); make harness-up builds them locally via `labs`, but this job
        # starts compose directly, so build them here or the shell scenarios fork/exec-fail.
        run: make labs
      - name: start Tempo + Collector
        run: docker compose -f deploy/docker-compose.yml up -d
      - name: wait for Tempo
        run: |
          ready=0
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:3200/ready; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "Tempo did not become ready within 60s"
            exit 1
          fi
      # Scenarios are I/O-bound (each waits on Tempo trace ingestion), so -parallel
      # overrides the GOMAXPROCS default to overlap their waits. A single mentat
      # binary is built once in TestMain and reused across scenarios.
      - run: go test -tags e2e ./e2e/ -v -parallel 16
      # Teardown below is `down -v`, which destroys the Tempo/Collector volumes.
      # Dump the stack's logs first on failure, or a red run leaves nothing to
      # diagnose but the test output — and trace-ingestion failures live in
      # Tempo's log, not Go's.
      - if: failure()
        run: docker compose -f deploy/docker-compose.yml logs --no-color
      - if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
