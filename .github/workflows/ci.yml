name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - run: golangci-lint run ./...
      - run: go test ./... -race
      - name: coverage gate (80%)
        run: bash .claude/skills/coverage/coverage.sh ./...

  mocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install go.uber.org/mock/mockgen@v0.6.0
      - run: go generate ./...
      - name: fail on uncommitted mock drift
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all -- internal/core/mocks)" ]; then
            git status --short -- internal/core/mocks
            echo "regenerate mocks: go generate ./..."
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: start Tempo + Collector
        run: docker compose -f deploy/docker-compose.yml up -d
      - name: wait for Tempo
        run: |
          ready=0
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:3200/ready; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "Tempo did not become ready within 60s"
            exit 1
          fi
      - run: go test -tags e2e ./e2e/ -v
      - if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
