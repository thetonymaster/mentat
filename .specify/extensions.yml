installed:
- agent-assign
- agent-context
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  after_plan:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  after_tasks:
  - extension: agent-assign
    command: speckit.agent-assign.assign
    enabled: true
    optional: true
    priority: 10
    prompt: Assign agents to the generated tasks?
    description: Automatically assign specialized agents to tasks after generation
    condition: null
