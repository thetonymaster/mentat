    source: "project"
    description: "Read-only context scout emitting structured pre-planning briefings; cannot edit files"
  - name: "go-reviewer"
    source: "project"
    description: "Read-only reviewer — 'pair' mid-task scan or 'gate' pre-commit audit with PASS/BLOCK verdict"
  - name: "go-test-writer"
